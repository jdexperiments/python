        gh release create "v${{ env.BUILD_VERSION }}-${{env.BUILD_TARGET}}" -n "release from pipeline" -t "v${{env.BUILD_VERSION}}-${{env.BUILD_TARGET}}" || true
        gh release upload "v${{ env.BUILD_VERSION }}-${{env.BUILD_TARGET}}" "python-${{env.BUILD_VERSION}}-linux-x86_64.tar.bz2" --clobber
