    steps:
    - name: Check out sources
      uses: actions/checkout@v7

    - name: Set up Python 3
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Install v143 Toolset for ARM64
      run: |
        Start-Process "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" `
        -ArgumentList "modify --installPath ""C:\Program Files\Microsoft Visual Studio\2026\Enterprise"" --add Microsoft.VisualStudio.Component.VC.14.44.17.14.ARM64 --quiet --norestart --wait" `
        -NoNewWindow -Wait

    - name: Setup MSVC developer command prompt
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: arm64
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    - name: Build python
