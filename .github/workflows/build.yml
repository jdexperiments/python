name: Build python

on:
  push:
    branches: [ "main" ]
    tags:
    - 'v*'




jobs:
  wait-dependencies:
    runs-on: ubuntu-24.04
    environment: build

    steps:
    - name: Check out sources
      uses: actions/checkout@v7

    - name: Set up Python 3
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Wait for dependencies
      shell: bash
      run: |
        export FROST_BUILDER_REPO_URL="${{ vars.FROST_BUILDER_REPO_URL }}"
        export FROST_BUILDER_REPO_USER="${{ vars.FROST_BUILDER_REPO_USER }}"
        export FROST_BUILDER_REPO_PREFIX="${{ vars.FROST_BUILDER_REPO_PREFIX }}"
        export FROST_BUILDER_REPO_SUPPORT="${{ vars.FROST_BUILDER_REPO_SUPPORT }}"
        echo "Cloning build support library"
        mkdir -p frost_support 
        pushd frost_support
        git clone "${FROST_BUILDER_REPO_URL}/${FROST_BUILDER_REPO_USER}/${FROST_BUILDER_REPO_SUPPORT}.git" .
        popd
        echo "Setting up target build variables"
        BUILD_VERSION=$( python3 package.py "version-combined" )
        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
        python3 package.py wait-dependencies


  build-python-linux-x86_64:
    runs-on: ubuntu-24.04
    needs: wait-dependencies
    environment: build

    steps:
    - name: Check out sources
      uses: actions/checkout@v7

    - name: Set up Python 3
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Check out build support scripts
      shell: bash
      run: |
        export FROST_BUILDER_REPO_URL="${{ vars.FROST_BUILDER_REPO_URL }}"
        export FROST_BUILDER_REPO_USER="${{ vars.FROST_BUILDER_REPO_USER }}"
        export FROST_BUILDER_REPO_PREFIX="${{ vars.FROST_BUILDER_REPO_PREFIX }}"
        export FROST_BUILDER_REPO_SUPPORT="${{ vars.FROST_BUILDER_REPO_SUPPORT }}"
        echo "Cloning build support library"
        mkdir -p frost_support 
        pushd frost_support
        git clone "${FROST_BUILDER_REPO_URL}/${FROST_BUILDER_REPO_USER}/${FROST_BUILDER_REPO_SUPPORT}.git" .
        popd
        echo "Setting up target build variables"
        BUILD_VERSION=$( python3 package.py "version-combined" )
        BUILD_TARGET="macos-x86_64"
        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
        echo "BUILD_TARGET=$BUILD_TARGET" >> $GITHUB_ENV

    - name: Install build requirements
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential checkinstall libreadline-dev libgdbm-dev libssl-dev libsqlite3-dev tk-dev libncurses5-dev libffi-dev libreadline-dev libbz2-dev liblzma-dev zlib1g-dev git

    - name: Build python
      shell: bash
      run: |
        ./scripts/python/build.sh

    - name: Upload artefacts
      uses: actions/upload-artifact@v7
      with:
        name: python-${{env.BUILD_VERSION}}-${{env.BUILD_TARGET}}.tar.bz2
        path: artefacts/python-${{env.BUILD_VERSION}}-${{env.BUILD_TARGET}}.tar.bz2
        compression-level: 0
        archive: false


