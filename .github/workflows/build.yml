        BUILD_TARGET="win-arm64"
        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
        echo "BUILD_TARGET=$BUILD_TARGET" >> $GITHUB_ENV

    - name: Setup MSVC developer command prompt
      uses: ilammy/msvc-dev-cmd@v1
