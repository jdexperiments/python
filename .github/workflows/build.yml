name: Build package

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  wait-dependencies:
    runs-on: ubuntu-slim
    environment: build

    steps:
    - name: Check out sources
      uses: actions/checkout@v7

    - name: Set up Python 3
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Wait for dependencies
      shell: bash
      run: |
        export FROST_BUILDER_PACKAGE_SOURCES="${{ vars.FROST_BUILDER_PACKAGE_SOURCES }}"
        export FROST_BUILDER_SUPPORT_SCRIPTS="${{ vars.FROST_BUILDER_SUPPORT_SCRIPTS }}"
        echo "Cloning build support library"
        mkdir -p frost_support 
        pushd frost_support
        git clone "${FROST_BUILDER_SUPPORT_SCRIPTS}" .
        popd
        echo "Setting up target build variables"
        BUILD_VERSION=$( python3 package.py "version-combined" )
        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
        python3 package.py wait-dependencies


  build-linux-x86_64:
    runs-on: ubuntu-24.04
    needs: wait-dependencies
    environment: build

    steps:
    - name: Check out sources
      uses: actions/checkout@v7

    - name: Set up Python 3
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Install build requirements
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential checkinstall libreadline-dev libgdbm-dev libssl-dev libsqlite3-dev tk-dev libncurses5-dev libffi-dev libreadline-dev libbz2-dev liblzma-dev zlib1g-dev git

    - name: Build python
      shell: bash
      run: |
        export FROST_BUILDER_PACKAGE_SOURCES="${{ vars.FROST_BUILDER_PACKAGE_SOURCES }}"
        export FROST_BUILDER_SUPPORT_SCRIPTS="${{ vars.FROST_BUILDER_SUPPORT_SCRIPTS }}"
        echo "Cloning build support library"
        mkdir -p frost_support 
        pushd frost_support
        git clone "${FROST_BUILDER_SUPPORT_SCRIPTS}" .
        popd
        echo "Setting up target build variables"
        export BUILD_VERSION=$( python3 package.py "version-combined" )
        export BUILD_TARGET="linux-x86_64"
        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV
        echo "BUILD_TARGET=$BUILD_TARGET" >> $GITHUB_ENV
        export BUILD_CPU_CORES=$(nproc)
        python3 package.py install-build-dependencies
        ./scripts/python/build.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: python-${{env.BUILD_VERSION}}-${{env.BUILD_TARGET}}.tar.bz2
        path: artifacts/python-${{env.BUILD_VERSION}}-${{env.BUILD_TARGET}}.tar.bz2
        compression-level: 0
        archive: false


