        archive: false

  build-python-win-arm64:
    runs-on: windows-11-vs2026-arm
    needs: wait-dependencies
    environment: build

    steps:
    - name: Check out sources
      uses: actions/checkout@v7

    - name: Set up Python 3
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Check out build support scripts
      shell: bash
      run: |
        export FROST_BUILDER_REPO_URL="${{ vars.FROST_BUILDER_REPO_URL }}"
        export FROST_BUILDER_REPO_USER="${{ vars.FROST_BUILDER_REPO_USER }}"
        export FROST_BUILDER_REPO_PREFIX="${{ vars.FROST_BUILDER_REPO_PREFIX }}"
        export FROST_BUILDER_REPO_SUPPORT="${{ vars.FROST_BUILDER_REPO_SUPPORT }}"
        mkdir -p frost_support 
        pushd frost_support
        git clone "${FROST_BUILDER_REPO_URL}/${FROST_BUILDER_REPO_USER}/${FROST_BUILDER_REPO_SUPPORT}.git" .
        popd

    - name: Setup MSVC developer command prompt
      uses: ilammy/msvc-dev-cmd@v1
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    - name: Build python
      shell: bash
      run: |
        VERSION=$(./scripts/version.sh)
        export WINDOWS_BUILD="arm64"
        export WINDOWS_PCPKG_TUPLE="arm64-windows"
        export TARGET_TUPLE="windows-arm64"
        ./scripts/python/build.sh
        echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV
        echo "TARGET=$TARGET_TUPLE" >> $GITHUB_ENV

    - name: Upload artefacts
